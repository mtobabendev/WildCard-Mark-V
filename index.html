<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
  />
  <meta name="theme-color" content="#05000a" />
  <title>WildCard DEV // PennyCore Cards</title>

  <style>
    :root {
      --bg0: #050008;
      --bg1: #130019;
      --pink: #ff4fd8;
      --hot: #ff79c8;
      --violet: #8f5cff;
      --cyan: #67e8ff;
      --green: #7dffb2;
      --gold: #ffd36b;
      --text: #fff7ff;
      --muted: #d8c0ea;
      --line: rgba(255, 121, 200, 0.50);
      --glass: rgba(14, 4, 26, 0.92);
      --cardW: min(58vw, 168px);
      --cardH: calc(var(--cardW) * 1.42);
      --ringZ: min(34vw, 122px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 79, 216, 0.22), transparent 34%),
        radial-gradient(circle at 50% 60%, rgba(103, 232, 255, 0.10), transparent 32%),
        linear-gradient(160deg, var(--bg0), var(--bg1) 56%, #030005);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overscroll-behavior: none;
      touch-action: none;
    }

    body {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100svh;
      overflow: hidden;
      display: grid;
      place-items: center;
      perspective: 900px;
      touch-action: none;
    }

    .halo {
      position: absolute;
      width: min(92vw, 355px);
      height: min(92vw, 355px);
      border-radius: 50%;
      border: 1px solid rgba(255, 121, 200, 0.22);
      box-shadow:
        0 0 38px rgba(255, 79, 216, 0.26),
        inset 0 0 46px rgba(143, 92, 255, 0.12);
      pointer-events: none;
    }

    .halo::before,
    .halo::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .halo::before {
      inset: 9%;
      border: 1px dashed rgba(255, 121, 200, 0.32);
      animation: breathe 4s ease-in-out infinite;
    }

    .halo::after {
      inset: 31%;
      border: 1px solid rgba(103, 232, 255, 0.18);
      box-shadow: inset 0 0 22px rgba(103, 232, 255, 0.12);
    }

    .deck {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      display: grid;
      place-items: center;
      touch-action: none;
      cursor: grab;
    }

    .deck.dragging {
      cursor: grabbing;
    }

    .card {
      --i: 0;
      --active: 0;
      --flip: 0deg;
      position: absolute;
      width: var(--cardW);
      height: var(--cardH);
      transform-style: preserve-3d;
      transform:
        rotateY(calc((var(--i) * 40deg) + var(--rot)))
        translateZ(var(--ringZ))
        scale(calc(0.72 + (var(--active) * 0.28)));
      transition:
        transform 180ms ease,
        filter 180ms ease,
        opacity 180ms ease;
      opacity: calc(0.44 + (var(--active) * 0.56));
      filter: blur(calc((1 - var(--active)) * 0.45px)) saturate(calc(0.9 + var(--active) * 0.28));
      border: 0;
      background: transparent;
      padding: 0;
      color: inherit;
      font: inherit;
      touch-action: none;
    }

    .card-inner {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transform: rotateY(var(--flip));
      transition: transform 260ms cubic-bezier(.2,.8,.2,1);
      border-radius: 18px;
    }

    .card.flipped .card-inner {
      --flip: 180deg;
    }

    .face {
      position: absolute;
      inset: 0;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 7px;
      padding: 14px 10px;
      border-radius: 18px;
      backface-visibility: hidden;
      overflow: hidden;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 50% 22%, rgba(255, 79, 216, 0.26), transparent 38%),
        linear-gradient(150deg, rgba(255, 121, 200, 0.16), rgba(8, 0, 16, 0.98));
      box-shadow:
        0 0 18px rgba(255, 79, 216, 0.35),
        inset 0 0 18px rgba(255, 121, 200, 0.08);
      text-align: center;
    }

    .face::before {
      content: attr(data-rank);
      position: absolute;
      top: 8px;
      left: 9px;
      color: var(--hot);
      font-size: 0.78rem;
      font-weight: 950;
      letter-spacing: 0.02em;
    }

    .face::after {
      content: "♠";
      position: absolute;
      right: 10px;
      bottom: 7px;
      color: var(--hot);
      font-size: 0.92rem;
    }

    .back {
      transform: rotateY(180deg);
      background:
        radial-gradient(circle at 50% 18%, rgba(103, 232, 255, 0.18), transparent 34%),
        linear-gradient(150deg, rgba(143, 92, 255, 0.24), rgba(8, 0, 16, 0.98));
    }

    .sigil {
      font-size: clamp(2rem, 14vw, 3.7rem);
      line-height: 0.9;
      color: var(--hot);
      text-shadow: 0 0 20px rgba(255, 79, 216, 0.88);
    }

    .title {
      font-size: clamp(0.92rem, 5vw, 1.35rem);
      font-weight: 950;
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .sub {
      max-width: 92%;
      color: var(--muted);
      font-size: clamp(0.56rem, 3.1vw, 0.74rem);
      line-height: 1.16;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .micro {
      color: var(--cyan);
      font-size: clamp(0.48rem, 2.5vw, 0.62rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .back .title {
      color: var(--green);
    }

    .actions {
      width: 100%;
      display: grid;
      gap: 7px;
      margin-top: 4px;
    }

    .action {
      display: block;
      width: 100%;
      min-height: 38px;
      border-radius: 999px;
      border: 1px solid rgba(255, 121, 200, 0.44);
      background: rgba(255, 121, 200, 0.12);
      color: var(--text);
      text-decoration: none;
      font-size: clamp(0.58rem, 3.4vw, 0.74rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      display: grid;
      place-items: center;
    }

    .action.primary {
      background: linear-gradient(135deg, rgba(255, 79, 216, 0.28), rgba(103, 232, 255, 0.12));
      box-shadow: 0 0 14px rgba(255, 79, 216, 0.25);
    }

    .wings {
      position: absolute;
      width: min(88vw, 330px);
      height: min(34vw, 120px);
      border-radius: 999px;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent, rgba(255, 121, 200, 0.16), transparent),
        radial-gradient(ellipse at 50% 50%, rgba(103, 232, 255, 0.08), transparent 58%);
      filter: blur(0.2px);
      opacity: 0.9;
    }

    .wing-label {
      position: absolute;
      bottom: max(12px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      width: min(88vw, 320px);
      text-align: center;
      color: var(--muted);
      font-size: clamp(0.58rem, 3vw, 0.72rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .route {
      position: absolute;
      top: max(10px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      width: min(86vw, 300px);
      text-align: center;
      color: var(--hot);
      font-size: clamp(0.58rem, 3.2vw, 0.76rem);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      pointer-events: none;
      text-shadow: 0 0 12px rgba(255, 79, 216, 0.72);
    }

    .qr-pop {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(5, 0, 10, 0.82);
      z-index: 20;
      padding: 18px;
    }

    .qr-pop.open {
      display: grid;
    }

    .qr-card {
      width: min(86vw, 300px);
      border-radius: 24px;
      border: 1px solid var(--line);
      background: var(--glass);
      box-shadow: 0 0 36px rgba(255, 79, 216, 0.36);
      padding: 18px;
      text-align: center;
      display: grid;
      gap: 12px;
    }

    .qr-box {
      width: min(58vw, 180px);
      aspect-ratio: 1;
      margin: 0 auto;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background:
        repeating-linear-gradient(90deg, #fff 0 8px, #111 8px 16px),
        repeating-linear-gradient(0deg, transparent 0 8px, rgba(0,0,0,.7) 8px 16px);
      color: #000;
      font-weight: 950;
      mix-blend-mode: screen;
    }

    .close {
      min-height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(255, 121, 200, 0.50);
      background: rgba(255, 121, 200, 0.14);
      color: var(--text);
      font-weight: 950;
      text-transform: uppercase;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.72; transform: rotate(0deg); }
      50% { opacity: 1; transform: rotate(7deg); }
    }

    @media (max-width: 380px), (max-height: 520px) {
      :root {
        --cardW: min(64vw, 142px);
        --ringZ: min(30vw, 82px);
      }

      .route {
        top: 8px;
      }

      .wing-label {
        bottom: 8px;
      }

      .actions {
        gap: 5px;
      }

      .action {
        min-height: 34px;
      }
    }
  </style>
</head>

  <script>
    (() => {
      const cards = Array.from(document.querySelectorAll(".card"));
      const deck = document.getElementById("deck");
      const routeLabel = document.getElementById("routeLabel");
      const hint = document.getElementById("hint");
      const qrPop = document.getElementById("qrPop");
      const closeQr = document.getElementById("closeQr");

      const count = cards.length;
      const step = 360 / count;

      let rotation = 0;
      let velocity = 0;
      let dragging = false;
      let pointerId = null;
      let startX = 0;
      let lastX = 0;
      let lastT = 0;
      let moved = false;
      let selected = 0;
      let raf = null;

      const names = [
        "Penny // Queen Concierge",
        "Matt // Operator Six",
        "Party // House Route",
        "Office // Internal Shell",
        "Labs // Build Route",
        "Studio // Shoot Mode",
        "Comms // Route Layer",
        "Jump // Watchverse",
        "Tasker // AutoWear"
      ];

      function normIndex(i) {
        return ((i % count) + count) % count;
      }

      function nearestIndex() {
        return normIndex(Math.round(-rotation / step));
      }

      function snapTo(index) {
        selected = normIndex(index);
        rotation = -selected * step;
        velocity = 0;
        update();
      }

      function setSelected(index) {
        selected = normIndex(index);
        cards.forEach((card, i) => {
          card.style.setProperty("--active", i === selected ? 1 : 0);
          if (i !== selected) card.classList.remove("flipped");
        });
        routeLabel.textContent = names[selected] || "PennyCore";
      }

      function update() {
        cards.forEach((card, i) => {
          card.style.setProperty("--rot", rotation + "deg");
        });
        setSelected(nearestIndex());
      }

      function animate() {
        if (!dragging) {
          rotation += velocity;
          velocity *= 0.93;

          if (Math.abs(velocity) < 0.08) {
            const target = -nearestIndex() * step;
            rotation += (target - rotation) * 0.16;

            if (Math.abs(target - rotation) < 0.08) {
              rotation = target;
              velocity = 0;
            }
          }

          update();
        }

        raf = requestAnimationFrame(animate);
      }

      function onDown(event) {
        if (event.target.closest("a")) return;

        dragging = true;
        moved = false;
        pointerId = event.pointerId;
        startX = event.clientX;
        lastX = event.clientX;
        lastT = performance.now();
        velocity = 0;
        deck.classList.add("dragging");

        try {
          deck.setPointerCapture(pointerId);
        } catch (_) {}
      }

      function onMove(event) {
        if (!dragging || event.pointerId !== pointerId) return;

        const now = performance.now();
        const dx = event.clientX - lastX;
        const dt = Math.max(16, now - lastT);

        if (Math.abs(event.clientX - startX) > 6) moved = true;

        rotation += dx * 0.42;
        velocity = (dx / dt) * 12;

        lastX = event.clientX;
        lastT = now;

        update();
      }

      function onUp(event) {
        if (!dragging || event.pointerId !== pointerId) return;

        dragging = false;
        pointerId = null;
        deck.classList.remove("dragging");

        try {
          deck.releasePointerCapture(event.pointerId);
        } catch (_) {}

        if (!moved) {
          const card = event.target.closest(".card");
          if (!card) return;

          const index = Number(card.dataset.index);
          if (index !== selected) {
            snapTo(index);
            return;
          }

          card.classList.toggle("flipped");
          hint.textContent = card.classList.contains("flipped")
            ? "Back of card active • tap OPEN or flip again"
            : "Swipe deck • tap center card • flip to launch";

          if (selected === 0 && card.classList.contains("flipped")) {
            setTimeout(() => {
              qrPop.classList.add("open");
              qrPop.setAttribute("aria-hidden", "false");
            }, 280);
          }
        }
      }

      function softBackTrap() {
        try {
          history.replaceState({ deck: true }, "", location.href);
          history.pushState({ deck: true }, "", location.href);
          window.addEventListener("popstate", () => {
            if (qrPop.classList.contains("open")) {
              qrPop.classList.remove("open");
              qrPop.setAttribute("aria-hidden", "true");
            } else {
              cards.forEach(card => card.classList.remove("flipped"));
              hint.textContent = "Swipe deck • tap center card • flip to launch";
            }
            history.pushState({ deck: true }, "", location.href);
          });
        } catch (_) {}
      }

      closeQr.addEventListener("click", () => {
        qrPop.classList.remove("open");
        qrPop.setAttribute("aria-hidden", "true");
      });

      document.addEventListener("contextmenu", (event) => event.preventDefault());
      document.addEventListener("gesturestart", (event) => event.preventDefault());

      deck.addEventListener("pointerdown", onDown);
      deck.addEventListener("pointermove", onMove);
      deck.addEventListener("pointerup", onUp);
      deck.addEventListener("pointercancel", onUp);

      snapTo(0);
      softBackTrap();
      animate();

      try {
        sessionStorage.setItem("wildcard_boot_mode", "cards-only-watch-physics");
      } catch (_) {}
    })();
  </script>
</body>
