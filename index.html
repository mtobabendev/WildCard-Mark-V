<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#05000a" />
  <title>WildCard DEV // PennyCore Spinner</title>
  <style>
    :root {
      --bg0: #050008;
      --bg1: #14001d;
      --hot: #ff79c8;
      --pink: #ff4fd8;
      --violet: #8f5cff;
      --cyan: #67e8ff;
      --green: #7dffb2;
      --text: #fff7ff;
      --muted: #dcc7ec;
      --line: rgba(255, 121, 200, 0.52);
      --glass: rgba(14, 4, 26, 0.94);
      --cardW: min(67vw, 184px);
      --cardH: calc(var(--cardW) * 1.42);
      --ringZ: min(34vw, 122px);
      --deckLift: 0px;
      --rot: 0deg;
      --step: 24deg;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 16%, rgba(255, 79, 216, 0.24), transparent 34%), radial-gradient(circle at 50% 58%, rgba(103, 232, 255, 0.11), transparent 34%), linear-gradient(160deg, var(--bg0), var(--bg1) 56%, #030005);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overscroll-behavior: none;
      touch-action: none;
    }

    body {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
    }

    a,
    button {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    #root {
      width: 100vw;
      height: 100svh;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100svh;
      overflow: hidden;
      display: grid;
      place-items: center;
      perspective: 900px;
      touch-action: none;
    }

    .route-label {
      position: absolute;
      top: max(9px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      width: min(88vw, 320px);
      text-align: center;
      color: var(--hot);
      font-size: clamp(0.56rem, 3.1vw, 0.76rem);
      letter-spacing: 0.13em;
      text-transform: uppercase;
      pointer-events: none;
      text-shadow: 0 0 12px rgba(255, 79, 216, 0.72);
      z-index: 8;
    }

    .halo {
      position: absolute;
      width: min(94vw, 365px);
      height: min(94vw, 365px);
      border-radius: 50%;
      border: 1px solid rgba(255, 121, 200, 0.22);
      box-shadow: 0 0 38px rgba(255, 79, 216, 0.26), inset 0 0 46px rgba(143, 92, 255, 0.12);
      pointer-events: none;
      transform: translateY(var(--deckLift));
      transition: transform 160ms ease;
    }

    .halo::before,
    .halo::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .halo::before {
      inset: 9%;
      border: 1px dashed rgba(255, 121, 200, 0.34);
      animation: breathe 4s ease-in-out infinite;
    }

    .halo::after {
      inset: 31%;
      border: 1px solid rgba(103, 232, 255, 0.18);
      box-shadow: inset 0 0 22px rgba(103, 232, 255, 0.12);
    }

    .wings {
      position: absolute;
      width: min(88vw, 330px);
      height: min(34vw, 120px);
      border-radius: 999px;
      pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(255, 121, 200, 0.18), transparent), radial-gradient(ellipse at 50% 50%, rgba(103, 232, 255, 0.08), transparent 58%);
      opacity: 0.95;
      transform: translateY(var(--deckLift));
      transition: transform 160ms ease;
    }

    .deck {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      transform-style: preserve-3d;
      touch-action: none;
      cursor: grab;
      transform: translateY(var(--deckLift));
      transition: transform 160ms ease;
      z-index: 5;
    }

    .deck.dragging {
      cursor: grabbing;
      transition: none;
    }

    .card {
      --i: 0;
      --active: 0;
      --flip: 0deg;
      position: absolute;
      width: var(--cardW);
      height: var(--cardH);
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      transform-style: preserve-3d;
      transform: rotateY(calc((var(--i) * var(--step)) + var(--rot))) translateZ(var(--ringZ)) scale(calc(0.66 + (var(--active) * 0.38)));
      opacity: calc(0.3 + (var(--active) * 0.7));
      filter: blur(calc((1 - var(--active)) * 0.45px)) saturate(calc(0.9 + var(--active) * 0.28)) brightness(calc(0.9 + var(--active) * 0.13));
      transition: transform 150ms ease, filter 150ms ease, opacity 150ms ease;
      touch-action: none;
      z-index: calc(10 + (var(--active) * 20));
    }

    .card-inner {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      transform-style: preserve-3d;
      transform: rotateY(var(--flip));
      transition: transform 260ms cubic-bezier(.2, .8, .2, 1);
    }

    .card.flipped .card-inner {
      --flip: 180deg;
    }

    .face {
      position: absolute;
      inset: 0;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 7px;
      padding: 13px 10px;
      border-radius: 20px;
      backface-visibility: hidden;
      overflow: hidden;
      border: 1px solid var(--line);
      background: radial-gradient(circle at 50% 20%, rgba(255, 79, 216, 0.28), transparent 38%), linear-gradient(150deg, rgba(255, 121, 200, 0.17), rgba(8, 0, 16, 0.98));
      box-shadow: 0 0 22px rgba(255, 79, 216, 0.36), inset 0 0 18px rgba(255, 121, 200, 0.08);
      text-align: center;
    }

    .face::before {
      content: attr(data-rank);
      position: absolute;
      top: 8px;
      left: 10px;
      color: var(--hot);
      font-size: 0.8rem;
      font-weight: 950;
      letter-spacing: 0.02em;
    }

    .face::after {
      content: "♠";
      position: absolute;
      right: 10px;
      bottom: 7px;
      color: var(--hot);
      font-size: 0.95rem;
    }

    .back {
      transform: rotateY(180deg);
      background: radial-gradient(circle at 50% 18%, rgba(103, 232, 255, 0.18), transparent 34%), linear-gradient(150deg, rgba(143, 92, 255, 0.24), rgba(8, 0, 16, 0.98));
    }

    .penny-card .front {
      background: radial-gradient(circle at 50% 8%, rgba(255, 121, 200, 0.34), transparent 36%), radial-gradient(circle at 50% 62%, rgba(103, 232, 255, 0.08), transparent 42%), linear-gradient(150deg, rgba(255, 121, 200, 0.2), rgba(7, 0, 14, 0.98));
    }

    .sigil {
      font-size: clamp(1.72rem, 12vw, 3.35rem);
      line-height: 0.9;
      color: var(--hot);
      text-shadow: 0 0 20px rgba(255, 79, 216, 0.88);
    }

    .penny-card .sigil {
      font-size: clamp(2.35rem, 16vw, 4rem);
    }

    .title {
      font-size: clamp(0.94rem, 5.1vw, 1.36rem);
      font-weight: 950;
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .sub {
      max-width: 94%;
      color: var(--muted);
      font-size: clamp(0.55rem, 3.05vw, 0.74rem);
      line-height: 1.16;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .micro {
      color: var(--cyan);
      font-size: clamp(0.48rem, 2.45vw, 0.62rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .back .title {
      color: var(--green);
    }

    .contact-lines {
      width: 100%;
      display: grid;
      gap: 5px;
      margin-top: 3px;
    }

    .contact-lines a,
    .contact-lines span {
      display: block;
      width: 100%;
      padding: 5px 6px;
      border: 1px solid rgba(255, 121, 200, 0.34);
      border-radius: 10px;
      background: rgba(255, 121, 200, 0.08);
      color: var(--text);
      font-size: clamp(0.47rem, 2.65vw, 0.63rem);
      font-weight: 850;
      line-height: 1.1;
      letter-spacing: 0.02em;
      overflow-wrap: anywhere;
    }

    .actions {
      width: 100%;
      display: grid;
      gap: 7px;
      margin-top: 4px;
    }

    .action {
      width: 100%;
      min-height: 38px;
      border-radius: 999px;
      border: 1px solid rgba(255, 121, 200, 0.46);
      background: rgba(255, 121, 200, 0.12);
      color: var(--text);
      font-size: clamp(0.58rem, 3.4vw, 0.75rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      display: grid;
      place-items: center;

    .action.primary {

      text-transform: uppercase;

      height: clamp(44px, 14vw, 56px);

      border: 1px solid rgba(255, 121, 200, 0.66);

      place-items: center;

      font-weight: 950;
      z-index: 16;
      touch-action: manipulation;

    .penny-chip::after {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(103, 232, 255, 0.18);
      animation: chipPulse 2.8s ease-in-out infinite;
    }

    .panel-pop {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(5, 0, 10, 0.88);
      z-index: 30;
      padding: 16px;
      touch-action: none;
    }

    .panel-pop.open {
      display: grid;
    }

    .quick-card {
      width: min(88vw, 320px);
      max-height: min(90svh, 540px);
      overflow: auto;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: radial-gradient(circle at 50% 0%, rgba(255, 79, 216, 0.18), transparent 34%), var(--glass);
      box-shadow: 0 0 36px rgba(255, 79, 216, 0.36);
      padding: 16px;
      text-align: center;
      display: grid;
      gap: 10px;
    }

    .quick-title {
      margin: 0;
      color: var(--green);
      font-size: clamp(1rem, 5vw, 1.3rem);
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .quick-sub {
      margin: 0;
      color: var(--muted);
      font-size: clamp(0.62rem, 3vw, 0.76rem);
      line-height: 1.25;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .layer-stack {
      display: grid;
      gap: 7px;
      padding: 10px;
      border-radius: 16px;
      border: 1px solid rgba(103, 232, 255, 0.28);
      background: rgba(103, 232, 255, 0.07);
    }

    .layer-row {
      display: grid;
      grid-template-columns: 46px 1fr;
      align-items: center;
      gap: 8px;
      text-align: left;
      color: var(--text);
      font-size: clamp(0.58rem, 3vw, 0.72rem);
      line-height: 1.15;
    }

    .layer-row b {
      color: var(--green);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .quick-grid .action {
      min-height: 42px;
    }

    .route-box {
      display: grid;
      gap: 5px;
      padding: 10px;
      border-radius: 16px;
      border: 1px solid rgba(103, 232, 255, 0.32);
      background: rgba(103, 232, 255, 0.07);
      color: var(--cyan);
      font-size: clamp(0.58rem, 3vw, 0.72rem);
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .close {
      min-height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(255, 121, 200, 0.5);
      background: rgba(255, 121, 200, 0.14);
      color: var(--text);
      font-weight: 950;
      text-transform: uppercase;
    }

    @keyframes breathe {

      0%,
      100% {
        opacity: 0.72;
        transform: rotate(0deg);
      }

      50% {
        opacity: 1;
        transform: rotate(7deg);
      }
    }

    @keyframes chipPulse {

      0%,
      100% {
        opacity: 0.46;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.12);
      }
    }

    @media (max-width: 380px),
    (max-height: 520px) {

      }
    }

    @media (prefers-reduced-motion: reduce) {

      .penny-chip::after {
        animation: none;
      }
    }
  </style>
